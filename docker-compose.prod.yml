services:
  pythia-landing:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - KLAVIYO_PUBLIC_API_KEY=${KLAVIYO_PUBLIC_API_KEY}
      - KLAVIYO_PUBLIC_PROFILES_URL=${KLAVIYO_PUBLIC_PROFILES_URL}
    restart: unless-stopped

networks:
  default:
    name: pythia-network 